name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # `npm install`, not `npm ci`: the `overrides` field (security pins for
      # transitive esbuild/postcss) makes npm mark vitest's platform-specific
      # esbuild binaries "extraneous" in lockfiles generated on Windows — a
      # known npm bug that breaks `npm ci` on Linux. Versions still resolve
      # from the committed lockfile.
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      # Build works without real secrets by design: the DB client is a lazy
      # proxy and auth config reads env at request time, not build time.
      - name: Build
        run: npm run build
